<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binary Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    header .title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #e94560;
      letter-spacing: 2px;
    }

    .mode-toggle {
      display: flex;
      border: 1px solid #e94560;
      border-radius: 4px;
      overflow: hidden;
    }

    .mode-toggle button {
      padding: 5px 14px;
      background: transparent;
      color: #888;
      border: none;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.8rem;
      letter-spacing: 1px;
      transition: background 0.15s, color 0.15s;
    }

    .mode-toggle button.active {
      background: #e94560;
      color: #fff;
      font-weight: bold;
    }

    .mode-toggle button:not(.active):hover {
      background: #1f1f3a;
      color: #e0e0e0;
    }

    .mode-hint {
      font-size: 0.72rem;
      color: #555;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-left { border-right: 2px solid #0f3460; }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #e94560;
      margin-bottom: 4px;
    }

    textarea {
      width: 100%;
      background: #0d0d1a;
      color: #00ff88;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 12px;
      font-family: monospace;
      font-size: 1rem;
      outline: none;
      line-height: 1.6;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #e94560; }

    textarea[readonly] {
      opacity: 0.55;
      cursor: default;
    }

    #binary-input { flex: 1; min-height: 300px; }
    #ascii-textarea { min-height: 80px; }

    .stats {
      font-size: 0.75rem;
      color: #666;
    }
    .stats span { color: #00ff88; }

    /* Pixel grid controls */
    .pixel-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pixel-controls label { font-size: 0.75rem; color: #888; }

    .pixel-controls input[type=range] {
      accent-color: #e94560;
      width: 80px;
    }

    .pixel-controls input[type=number] {
      background: #0d0d1a;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 3px;
      padding: 2px 6px;
      width: 56px;
      font-family: monospace;
      font-size: 0.85rem;
    }

    /* Pixel grid wrapper */
    #pixel-grid-wrapper {
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 8px;
      overflow: auto;
      flex: 1;
      min-height: 120px;
      transition: border-color 0.2s;
    }

    #pixel-grid-wrapper.interactive { border-color: #e94560; }

    /* The grid itself: a flex-wrap row of pixel divs */
    #pixel-grid {
      display: flex;
      flex-wrap: wrap;
      /* width is set inline to match imgWidth * cellSize */
    }

    .pixel {
      flex-shrink: 0;
      background: #000;
    }

    .pixel.on  { background: #fff; }
    .pixel.pad { background: #1a1a2e; }

    #pixel-grid-wrapper.interactive .pixel:not(.pad) {
      cursor: crosshair;
    }

    .canvas-hint {
      font-size: 0.7rem;
      color: #555;
      transition: color 0.2s;
    }
    .canvas-hint.active { color: #e94560; }

    /* Playback controls */
    .play-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    #play-btn {
      padding: 5px 16px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    #play-btn:hover { background: #c73050; }
    #play-btn.playing { background: #333; border: 1px solid #e94560; color: #e94560; }
    #play-btn:disabled { opacity: 0.35; cursor: default; }

    .play-controls label { font-size: 0.75rem; color: #888; }
    .play-controls input[type=range] { accent-color: #e94560; width: 80px; }
    .play-controls input[type=number] {
      background: #0d0d1a;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 3px;
      padding: 2px 6px;
      width: 56px;
      font-family: monospace;
      font-size: 0.85rem;
    }

    .play-controls select {
      background: #0d0d1a;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 3px;
      padding: 2px 6px;
      font-family: monospace;
      font-size: 0.8rem;
    }

    .pixel.current-byte {
      outline: 2px solid #e94560;
      outline-offset: -1px;
      z-index: 1;
      position: relative;
    }

    /* Audio sequence */
    #audio-seq-wrapper {
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 8px;
      height: 150px;
      overflow-x: auto;
      overflow-y: hidden;
      transition: border-color 0.2s;
    }

    #audio-seq-wrapper.interactive { border-color: #e94560; }

    #audio-seq {
      display: flex;
      align-items: stretch;
      height: 100%;
      gap: 2px;
    }

    .note-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 22px;
      flex-shrink: 0;
    }

    .note-col input[type=range] {
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 22px;
      flex: 1;
      accent-color: #e94560;
      margin: 0;
      padding: 0;
      cursor: ns-resize;
    }

    .note-col input[type=range]:disabled { cursor: default; }

    .note-col.current {
      background: rgba(0, 255, 136, 0.12);
      border-radius: 3px;
      outline: 1px solid #00ff88;
    }

    .note-col input[type=range] { accent-color: #e94560; }
    .note-col.silent input[type=range] { accent-color: #444; }
    .note-col.current input[type=range] { accent-color: #00ff88; }

    .note-col .note-label {
      font-size: 0.55rem;
      color: #666;
      margin-top: 4px;
      text-align: center;
      line-height: 1;
      width: 22px;
      white-space: nowrap;
      overflow: hidden;
    }

    .note-col.current .note-label { color: #00ff88; }
  </style>
</head>
<body>

<header>
  <div class="title">BINARY EXPLORER</div>
  <div class="mode-toggle">
    <button id="btn-receiving" class="active" onclick="setMode('receiving')">RECEIVING</button>
    <button id="btn-sending" onclick="setMode('sending')">SENDING</button>
  </div>
  <div class="mode-hint" id="mode-hint">Edit binary → see decoded output</div>
</header>

<div class="main">

  <!-- LEFT: Binary -->
  <div class="panel panel-left">
    <div class="label">Binary</div>
    <textarea id="binary-input" spellcheck="false" placeholder="Type 0s and 1s here..."></textarea>
    <div class="stats">
      Bits: <span id="stat-bits">0</span> &nbsp;|&nbsp;
      Bytes: <span id="stat-bytes">0</span> &nbsp;|&nbsp;
      Complete bytes: <span id="stat-complete">0</span>
    </div>
  </div>

  <!-- RIGHT: Outputs -->
  <div class="panel panel-right">

    <div class="label">ASCII Text (8 bits per character)</div>
    <textarea id="ascii-textarea" spellcheck="false" placeholder="ASCII text here..."></textarea>

    <div class="label">
      Pixel Image
      <span class="canvas-hint" id="canvas-hint">&nbsp;</span>
    </div>
    <div class="pixel-controls">
      <label>Width:
        <input type="number" id="img-width" value="8" min="1" max="512">
      </label>
      <label id="img-height-label">Height:
        <input type="number" id="img-height" value="8" min="1" max="512">
      </label>
      <label>Cell size:
        <input type="range" id="cell-size" min="2" max="32" value="12">
        <span id="cell-size-val">12</span>px
      </label>
    </div>
    <div id="pixel-grid-wrapper">
      <div id="pixel-grid"></div>
    </div>

    <div class="label">
      Audio Sequence (0 = silence · 1 = C3 · 13 = C4 · 25 = C5)
      <span class="canvas-hint" id="audio-hint">&nbsp;</span>
    </div>
    <div class="play-controls">
      <button id="play-btn" disabled onclick="togglePlayback()">▶ PLAY</button>
      <label id="num-notes-label">Notes:
        <input type="number" id="num-notes" value="8" min="1" max="512">
      </label>
      <label>Speed:
        <input type="range" id="note-speed" min="30" max="600" value="180" step="10">
        <span id="note-speed-val">180</span>ms/note
      </label>
      <select id="wave-type">
        <option value="sine">sine</option>
        <option value="triangle" selected>triangle</option>
        <option value="square">square</option>
        <option value="sawtooth">sawtooth</option>
      </select>
    </div>
    <div id="audio-seq-wrapper">
      <div id="audio-seq"></div>
    </div>

  </div>
</div>

<script>
  const binaryEl    = document.getElementById('binary-input');
  const asciiEl     = document.getElementById('ascii-textarea');
  const gridWrapper = document.getElementById('pixel-grid-wrapper');
  const grid        = document.getElementById('pixel-grid');
  const imgWidthEl  = document.getElementById('img-width');
  const imgHeightEl = document.getElementById('img-height');
  const imgHeightLabel = document.getElementById('img-height-label');
  const cellSizeEl  = document.getElementById('cell-size');
  const cellSizeVal = document.getElementById('cell-size-val');
  const statBits    = document.getElementById('stat-bits');
  const statBytes   = document.getElementById('stat-bytes');
  const statComplete= document.getElementById('stat-complete');
  const canvasHint  = document.getElementById('canvas-hint');
  const modeHint    = document.getElementById('mode-hint');
  const audioSeqWrapper = document.getElementById('audio-seq-wrapper');
  const audioSeq    = document.getElementById('audio-seq');
  const audioHint   = document.getElementById('audio-hint');
  const numNotesEl  = document.getElementById('num-notes');
  const numNotesLabel = document.getElementById('num-notes-label');

  let mode = 'receiving';
  let bits = []; // canonical state in sending mode

  // Byte (0–255) → slider value (0–25). 0 = silence, 1 = C3 (MIDI 48), 25 = C5 (MIDI 72)
  function byteToNote(byte) { return byte % 26; }
  function noteValueToMidi(v) { return v === 0 ? null : 47 + v; }
  function noteName(v) {
    if (v === 0) return '·';
    const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const midi = 47 + v;
    return names[midi % 12] + (Math.floor(midi / 12) - 1);
  }

  // ── Mode switching ────────────────────────────────────────────────────────

  function setMode(m) {
    mode = m;
    document.getElementById('btn-receiving').classList.toggle('active', m === 'receiving');
    document.getElementById('btn-sending').classList.toggle('active', m === 'sending');

    if (m === 'receiving') {
      modeHint.textContent = 'Edit binary → see decoded output';
      binaryEl.readOnly = false;
      asciiEl.readOnly  = true;
      gridWrapper.classList.remove('interactive');
      canvasHint.textContent = '';
      canvasHint.classList.remove('active');
      audioSeqWrapper.classList.remove('interactive');
      audioHint.textContent = '';
      audioHint.classList.remove('active');
      imgHeightLabel.style.display = 'none';
      numNotesLabel.style.display = 'none';
      renderFromBinary();
    } else {
      modeHint.textContent = 'Edit ASCII, pixels, or note sliders → generates binary';
      binaryEl.readOnly = true;
      asciiEl.readOnly  = false;
      gridWrapper.classList.add('interactive');
      canvasHint.textContent = '— click to toggle pixels';
      canvasHint.classList.add('active');
      audioSeqWrapper.classList.add('interactive');
      audioHint.textContent = '— drag sliders to compose';
      audioHint.classList.add('active');
      imgHeightLabel.style.display = '';
      numNotesLabel.style.display = '';
      bits = binaryEl.value.replace(/[^01]/g, '').split('').map(Number);
      resizeBitsToGrid();
      numNotesEl.value = Math.floor(bits.length / 8);
      renderFromBits();
    }
  }

  function resizeBitsToGrid() {
    const total = Math.max(1, parseInt(imgWidthEl.value) || 8) *
                  Math.max(1, parseInt(imgHeightEl.value) || 8);
    while (bits.length < total) bits.push(0);
    if (bits.length > total) bits = bits.slice(0, total);
  }

  function resizeBitsToNotes() {
    const total = Math.max(1, parseInt(numNotesEl.value) || 8) * 8;
    while (bits.length < total) bits.push(0);
    if (bits.length > total) bits = bits.slice(0, total);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function updateStats(bitStr) {
    statBits.textContent    = bitStr.length;
    statBytes.textContent   = (bitStr.length / 8).toFixed(2);
    statComplete.textContent= Math.floor(bitStr.length / 8);
  }

  function bitsToAscii(bitStr) {
    let text = '';
    for (let i = 0; i + 8 <= bitStr.length; i += 8) {
      const code = parseInt(bitStr.slice(i, i + 8), 2);
      if (code >= 32 && code <= 126) text += String.fromCharCode(code);
      else if (code === 10 || code === 13) text += '\n';
      else text += '·';
    }
    return text;
  }

  function asciiToBits(text) {
    let out = '';
    for (const ch of text) out += ch.charCodeAt(0).toString(2).padStart(8, '0');
    return out;
  }

  function drawGrid(bitStr) {
    const cellSize = parseInt(cellSizeEl.value);
    const imgWidth = Math.max(1, parseInt(imgWidthEl.value) || 8);
    const sz = cellSize + 'px';

    const rows = mode === 'sending'
      ? Math.max(1, parseInt(imgHeightEl.value) || 8)
      : (bitStr.length === 0 ? 0 : Math.ceil(bitStr.length / imgWidth));
    const total = rows * imgWidth;

    // Reuse existing divs — only create/remove as needed
    while (grid.children.length < total) {
      const d = document.createElement('div');
      d.className = 'pixel';
      grid.appendChild(d);
    }
    while (grid.children.length > total) {
      grid.removeChild(grid.lastChild);
    }

    grid.style.width = (imgWidth * cellSize) + 'px';

    for (let i = 0; i < total; i++) {
      const d = grid.children[i];
      d.style.width  = sz;
      d.style.height = sz;
      if (i < bitStr.length) {
        d.classList.remove('pad');
        d.classList.toggle('on', bitStr[i] === '1');
        d.dataset.idx = i;
      } else {
        d.classList.add('pad');
        d.classList.remove('on');
        d.removeAttribute('data-idx');
      }
    }
  }

  // ── Audio sequence (one slider per complete byte) ─────────────────────────

  function setByteValue(byteIdx, byteValue) {
    const bitStr = byteValue.toString(2).padStart(8, '0');
    for (let i = 0; i < 8; i++) bits[byteIdx * 8 + i] = parseInt(bitStr[i]);
    const full = bits.join('');
    binaryEl.value = full;
    asciiEl.value = bitsToAscii(full);
    updateStats(full);
    drawGrid(full);
    updatePlayBtnState();
  }

  function createNoteCol(idx) {
    const col = document.createElement('div');
    col.className = 'note-col';

    const s = document.createElement('input');
    s.type = 'range';
    s.min = '0';
    s.max = '25';
    s.step = '1';
    s.value = '0';
    s.setAttribute('orient', 'vertical');
    s.addEventListener('input', () => {
      if (mode !== 'sending') return;
      if (isPlaying) stopPlayback();
      const v = parseInt(s.value);
      col.classList.toggle('silent', v === 0);
      const position = Array.prototype.indexOf.call(audioSeq.children, col);
      setByteValue(position, v);
      col.querySelector('.note-label').textContent = noteName(v);
    });
    col.appendChild(s);

    const label = document.createElement('div');
    label.className = 'note-label';
    label.textContent = '·';
    col.appendChild(label);

    return col;
  }

  function drawAudioSequence() {
    const bytes = getCurrentBytes();
    const sending = mode === 'sending';
    while (audioSeq.children.length < bytes.length) {
      audioSeq.appendChild(createNoteCol(audioSeq.children.length));
    }
    while (audioSeq.children.length > bytes.length) {
      audioSeq.removeChild(audioSeq.lastChild);
    }
    for (let i = 0; i < bytes.length; i++) {
      const col = audioSeq.children[i];
      const slider = col.querySelector('input');
      const v = byteToNote(bytes[i]);
      if (parseInt(slider.value) !== v) slider.value = v;
      slider.disabled = !sending;
      col.classList.toggle('silent', v === 0);
      col.querySelector('.note-label').textContent = noteName(v);
    }
  }

  // ── Receiving mode ────────────────────────────────────────────────────────

  function renderFromBinary() {
    const bitStr = binaryEl.value.replace(/[^01]/g, '');
    updateStats(bitStr);
    asciiEl.value = bitsToAscii(bitStr);
    drawGrid(bitStr);
    drawAudioSequence();
    updatePlayBtnState();
  }

  binaryEl.addEventListener('input', () => {
    if (mode !== 'receiving') return;
    const sel = binaryEl.selectionStart;
    const raw = binaryEl.value;
    const clean = raw.replace(/[^01\n]/g, '');
    if (clean !== raw) {
      binaryEl.value = clean;
      binaryEl.selectionStart = binaryEl.selectionEnd =
        raw.slice(0, sel).replace(/[^01\n]/g, '').length;
    }
    renderFromBinary();
  });

  // ── Sending mode ──────────────────────────────────────────────────────────

  function renderFromBits() {
    const bitStr = bits.join('');
    binaryEl.value = bitStr;
    updateStats(bitStr);
    asciiEl.value = bitsToAscii(bitStr);
    drawGrid(bitStr);
    drawAudioSequence();
    updatePlayBtnState();
  }

  asciiEl.addEventListener('input', () => {
    if (mode !== 'sending') return;
    const bitStr = asciiToBits(asciiEl.value);
    bits = bitStr.split('').map(Number);
    binaryEl.value = bitStr;
    updateStats(bitStr);
    drawGrid(bitStr);
    drawAudioSequence();
    updatePlayBtnState();
  });

  let painting = false;
  let paintValue = 0; // the value to write while dragging

  function paintPixel(d) {
    if (!d || d.classList.contains('pad')) return;
    const idx = parseInt(d.dataset.idx);
    if (bits[idx] === paintValue) return;
    bits[idx] = paintValue;
    d.classList.toggle('on', paintValue === 1);
    const bitStr = bits.join('');
    binaryEl.value = bitStr;
    asciiEl.value = bitsToAscii(bitStr);
    updateStats(bitStr);
    drawAudioSequence();
    updatePlayBtnState();
  }

  grid.addEventListener('mousedown', (e) => {
    if (mode !== 'sending') return;
    const d = e.target.closest('.pixel:not(.pad)');
    if (!d) return;
    e.preventDefault(); // prevent text selection while dragging
    painting = true;
    const idx = parseInt(d.dataset.idx);
    paintValue = bits[idx] === 1 ? 0 : 1; // opposite of what we clicked
    paintPixel(d);
  });

  grid.addEventListener('mousemove', (e) => {
    if (!painting || mode !== 'sending') return;
    const d = e.target.closest('.pixel:not(.pad)');
    if (d) paintPixel(d);
  });

  window.addEventListener('mouseup', () => { painting = false; });

  // ── Controls ──────────────────────────────────────────────────────────────

  cellSizeEl.addEventListener('input', () => {
    cellSizeVal.textContent = cellSizeEl.value;
    redraw();
  });

  imgWidthEl.addEventListener('input', () => {
    if (mode === 'sending') { resizeBitsToGrid(); renderFromBits(); }
    else redraw();
  });

  imgHeightEl.addEventListener('input', () => {
    if (mode === 'sending') { resizeBitsToGrid(); renderFromBits(); }
  });

  numNotesEl.addEventListener('input', () => {
    if (mode !== 'sending') return;
    if (isPlaying) stopPlayback();
    resizeBitsToNotes();
    renderFromBits();
  });

  function redraw() {
    if (mode === 'receiving') renderFromBinary();
    else drawGrid(bits.join(''));
  }

  // ── Audio playback ────────────────────────────────────────────────────────

  const playBtn       = document.getElementById('play-btn');
  const noteSpeedEl   = document.getElementById('note-speed');
  const noteSpeedVal  = document.getElementById('note-speed-val');
  const waveTypeEl    = document.getElementById('wave-type');

  let audioCtx        = null;
  let playbackNodes   = [];
  let playTimers      = [];
  let isPlaying       = false;

  noteSpeedEl.addEventListener('input', () => {
    noteSpeedVal.textContent = noteSpeedEl.value;
  });

  setMode('receiving');

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function midiToFreq(note) {
    return 440 * Math.pow(2, (note - 69) / 12);
  }

  function getCurrentBytes() {
    const bitStr = (mode === 'receiving'
      ? binaryEl.value.replace(/[^01]/g, '')
      : bits.join(''));
    const bytes = [];
    for (let i = 0; i + 8 <= bitStr.length; i += 8)
      bytes.push(parseInt(bitStr.slice(i, i + 8), 2));
    return bytes;
  }

  function updatePlayBtn() {
    playBtn.textContent = isPlaying ? '■ STOP' : '▶ PLAY';
    playBtn.classList.toggle('playing', isPlaying);
  }

  function clearHighlight() {
    document.querySelectorAll('.pixel.current-byte')
      .forEach(p => p.classList.remove('current-byte'));
    document.querySelectorAll('.note-col.current')
      .forEach(c => c.classList.remove('current'));
  }

  function highlightByte(byteIdx) {
    clearHighlight();
    for (let j = 0; j < 8; j++) {
      const el = grid.children[byteIdx * 8 + j];
      if (el && !el.classList.contains('pad')) el.classList.add('current-byte');
    }
    const col = audioSeq.children[byteIdx];
    if (col) col.classList.add('current');
  }

  function stopPlayback() {
    playbackNodes.forEach(n => { try { n.stop(0); } catch (_) {} });
    playbackNodes = [];
    playTimers.forEach(t => clearTimeout(t));
    playTimers = [];
    isPlaying = false;
    clearHighlight();
    updatePlayBtn();
  }

  function startPlayback() {
    const bytes = getCurrentBytes();
    if (!bytes.length) return;

    const ctx         = getAudioCtx();
    const msDuration  = parseInt(noteSpeedEl.value);
    const secDuration = msDuration / 1000;
    const wave        = waveTypeEl.value;
    const startTime   = ctx.currentTime + 0.02;

    isPlaying = true;
    updatePlayBtn();

    bytes.forEach((byte, i) => {
      const noteVal = byteToNote(byte);
      const midi    = noteValueToMidi(noteVal);
      const t       = startTime + i * secDuration;

      if (midi !== null) {
        const freq    = midiToFreq(midi);
        const attack  = Math.min(0.01, secDuration * 0.1);
        const release = Math.min(secDuration * 0.85, secDuration - attack);

        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.type            = wave;
        osc.frequency.value = freq;
        const peakGain = wave === 'sine' ? 0.75 : 0.25;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(peakGain, t + attack);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + release);

        osc.start(t);
        osc.stop(t + secDuration);
        playbackNodes.push(osc);
      }

      const delay = (t - ctx.currentTime) * 1000;
      playTimers.push(setTimeout(() => {
        if (!isPlaying) return;
        highlightByte(i);
      }, delay));
    });

    const total = startTime + bytes.length * secDuration - ctx.currentTime;
    playTimers.push(setTimeout(stopPlayback, total * 1000 + 100));
  }

  function togglePlayback() {
    if (isPlaying) stopPlayback();
    else startPlayback();
  }

  // Enable/disable play button based on whether there are complete bytes
  function updatePlayBtnState() {
    const bytes = getCurrentBytes();
    playBtn.disabled = bytes.length === 0;
  }

  // Stop playback if binary changes while playing
  binaryEl.addEventListener('input', () => { if (isPlaying) stopPlayback(); });
  asciiEl.addEventListener('input',  () => { if (isPlaying) stopPlayback(); });

</script>
